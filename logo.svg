<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" role="img" aria-label="Tidy Guys">
  <style>
    .word { font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-weight: 700; font-style: italic; fill: #0f172a; }
    .accent { fill: #dc2626; }
  </style>
  <!-- Wordmark "Tidy" -->
  <text x="0" y="62" class="word" font-size="64">Tidy</text>
  <!-- Small house in middle -->
  <g transform="translate(140, 22) scale(0.9)" class="accent">
    <path d="M0 24 L16 6 L32 24 L32 44 L0 44 Z" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <path d="M16 6 L16 0" stroke="#dc2626" stroke-width="2.5"/>
    <rect x="12" y="30" width="8" height="14" fill="#dc2626"/>
  </g>
  <!-- Wordmark "Guys" -->
  <text x="190" y="62" class="word" font-size="64">Guys</text>
</svg>
